services:
  - type: web
    name: gwadloup-alert
    runtime: node
    plan: free
    buildCommand: npm ci --production
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.12.0
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: GROQ_KEY_1
        sync: false
      - key: GROQ_KEY_2
        sync: false
      - key: GROQ_KEY_3
        sync: false
      - key: GROQ_KEY_4
        sync: false
      - key: GROQ_KEY_5
        sync: false
      - key: GROQ_KEY_6
        sync: false
      - key: GROQ_KEY_7
        sync: false
